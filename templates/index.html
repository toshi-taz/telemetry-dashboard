<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Wildlife Telemetry Dashboard</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #0d1117; color: #e6edf3; }
        header { background: #161b22; padding: 16px 24px; border-bottom: 1px solid #30363d; }
        header h1 { font-size: 1.4rem; color: #58a6ff; }
        header p { font-size: 0.85rem; color: #8b949e; margin-top: 2px; }
        .container { display: grid; grid-template-columns: 1fr 320px; height: calc(100vh - 65px); }
        #map { width: 100%; height: 100%; }
        .sidebar { background: #161b22; border-left: 1px solid #30363d; overflow-y: auto; padding: 16px; }
        .sidebar h2 { font-size: 0.95rem; color: #58a6ff; margin-bottom: 12px; }
        .card { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 12px; margin-bottom: 10px; }
        .card h3 { font-size: 0.85rem; color: #e6edf3; margin-bottom: 6px; }
        .card p { font-size: 0.78rem; color: #8b949e; margin: 2px 0; }
        .dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 6px; }
    </style>
</head>
<body>
    <header>
        <h1>🛰️ Wildlife Telemetry Dashboard</h1>
        <p>Fregata magnificens — MPIAB PNIC Hurricane Frigate Tracking</p>
    </header>
    <div class="container">
        <div id="map"></div>
        <div class="sidebar">
            <h2>Individuals</h2>
            <div id="stats-container"></div>
        </div>
    </div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([20, -80], 5);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '© CartoDB'
        }).addTo(map);

        fetch('/api/tracks')
            .then(r => r.json())
            .then(data => {
                data.forEach(ind => {
                    L.polyline(ind.puntos, {color: ind.color, weight: 1.5, opacity: 0.7}).addTo(map);
                    L.circleMarker([ind.ultimo.lat, ind.ultimo.lon], {
                        color: ind.color, radius: 6, fillOpacity: 0.9
                    }).bindPopup(`<b>${ind.id}</b><br>${ind.ultimo.timestamp}<br>Speed: ${ind.ultimo.speed} km/h`).addTo(map);
                });
            });

        fetch('/api/stats')
            .then(r => r.json())
            .then(data => {
                const colores = ["red", "blue", "green", "purple", "orange"];
                const container = document.getElementById('stats-container');
                data.forEach((ind, i) => {
                    container.innerHTML += `
                        <div class="card">
                            <h3><span class="dot" style="background:${colores[i]}"></span>${ind.id}</h3>
                            <p>Records: ${ind.registros}</p>
                            <p>Avg speed: ${ind.vel_promedio} km/h</p>
                            <p>Max speed: ${ind.vel_max} km/h</p>
                        </div>`;
                });
            });
    </script>
</body>
</html>
